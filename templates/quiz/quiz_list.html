<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Available Quizzes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    body {
      background: #90b0d3;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
      max-width: 800px;
      width: 100%;
    }
    h1 {
      color: #ed9508;
      margin-bottom: 20px;
      text-align: center;
    }
    .quiz-list {
      list-style: none;
    }
    .quiz-item {
      padding: 15px;
      margin-bottom: 10px;
      border: 1px solid #84c5fe;
      border-radius: 5px;
      background: #f0f8ff;
      transition: all 0.3s ease;
    }
    .quiz-item:hover {
      background: #94d7cb;
    }
    .quiz-item a {
      text-decoration: none;
      color: #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .quiz-item h3 {
      font-size: 1.2em;
    }
    .quiz-item p {
      color: #666;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Available Quizzes</h1>
    <ul class="quiz-list">
      {% for quiz in quizzes %}
      <li class="quiz-item">
        <a href="{% url 'quiz_detail' quiz.id %}">
          <div>
            <h3>{{ quiz.topic }}</h3>
            <p>{{ quiz.description|default:"No description" }}</p>
          </div>
          <span>Start Quiz →</span>
        </a>
      </li>
      {% empty %}
      <li>No quizzes available yet.</li>
      {% endfor %}
    </ul>
  </div>
</body>
</html>
